<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
</head>
<body>
  <div class="container">
    <div class="quizCard">
      <div class="quizHeader">
        <div class="quizIcon">?</div>
        <div>
          <h1>Quiz</h1>
          <p class="subtitle">Test your knowledge</p>
        </div>
      </div>
      
      <div class="quizContent">
        <div class="questionsDisplay"></div>
        <div class="answersDisplay"></div>

        <div class="bottomBar">
          <div class="scoreDisplay"></div>
          <button class="nextBtn" style="display: none;">Next</button>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
